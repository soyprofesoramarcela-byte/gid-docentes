
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>G.I.D.</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
/* ── SPLASH ── debe ir primero */
#splash{
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  background:#001a12;
  z-index:999999;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#splash-logo{
  width:88vw;height:auto;
  opacity:0;transform:scale(0.85);
  transition:opacity 1.2s ease,transform 1.2s ease;
  position:relative;z-index:2;
}
#splash-pts{position:absolute;inset:0;pointer-events:none;z-index:1;}
@keyframes pt{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}}

/* ── BASE ── */
:root{--vp:#034C36;--vo:#003332;--cr:#F2E0DF;--cs:#BDCDCF;--sa:#E3B8B8;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:18px;}
body{font-family:'DM Sans',sans-serif;background:var(--vo);color:var(--cr);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 10% 20%,rgba(3,76,54,0.5) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 90% 80%,rgba(3,76,54,0.3) 0%,transparent 55%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:0 20px 60px;}

/* Header */
header{padding:36px 0 24px;text-align:center;}
.mate-wrap{margin:0 auto 20px;width:56px;height:80px;display:block;}
.mate-svg{width:56px;height:80px;filter:drop-shadow(0 0 8px rgba(3,76,54,0.6));transition:filter 0.3s;}
.mate-svg:hover{filter:drop-shadow(0 0 14px rgba(227,184,184,0.4));}
.h-inst{font-size:11px;font-weight:300;letter-spacing:0.25em;text-transform:uppercase;color:var(--sa);opacity:0.7;margin-bottom:4px;display:block;}
.h-depto{font-size:20px;font-weight:300;letter-spacing:0.15em;color:var(--sa);margin-bottom:16px;display:block;}
.h-titulo{font-size:18px;font-weight:200;letter-spacing:0.22em;text-transform:uppercase;line-height:1.6;}
.h-gid{font-size:10px;font-weight:300;letter-spacing:0.3em;color:var(--sa);margin-top:6px;opacity:0.7;}
.h-bienestar{font-size:9px;font-weight:300;letter-spacing:0.35em;text-transform:uppercase;color:var(--cs);opacity:0.4;margin-top:4px;}

/* Banner cumple */
#cumple-banner{
  display:none;margin:0 0 20px;padding:16px 20px;
  background:linear-gradient(135deg,rgba(227,184,184,0.15),rgba(3,76,54,0.2));
  border:1px solid rgba(227,184,184,0.35);border-radius:16px;
  font-size:14px;color:var(--sa);text-align:center;
  animation:cumple-pulse 2s ease-in-out infinite;
  position:relative;overflow:hidden;
}
#cumple-banner::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(227,184,184,0.08),transparent);
  animation:cumple-shine 2.5s ease-in-out infinite;
}
@keyframes cumple-pulse{0%,100%{box-shadow:0 0 0 rgba(227,184,184,0);}50%{box-shadow:0 0 20px rgba(227,184,184,0.2);}}
@keyframes cumple-shine{0%{left:-100%;}100%{left:100%;}}

/* Carrusel — Stack 3D */
.carrusel-wrap-outer{margin-bottom:32px;position:relative;}
.carrusel-label{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--cs);opacity:0.35;margin-bottom:20px;text-align:center;}
.stack-container{position:relative;height:140px;margin:0 auto;cursor:pointer;user-select:none;}
.stack-card{
  position:absolute;left:0;right:0;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(189,205,207,0.12);
  border-radius:18px;padding:20px 22px;
  transition:all 0.45s cubic-bezier(0.34,1.56,0.64,1);
  will-change:transform,opacity;
  overflow:hidden;
}
.stack-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--sa),transparent);opacity:0;}
.stack-card.pos-0{
  transform:translateY(0) scale(1);
  opacity:1;z-index:3;
  background:rgba(3,76,54,0.18);
  border-color:rgba(227,184,184,0.2);
}
.stack-card.pos-0::before{opacity:1;}
.stack-card.pos-1{transform:translateY(12px) scale(0.95);opacity:0.6;z-index:2;}
.stack-card.pos-2{transform:translateY(22px) scale(0.90);opacity:0.3;z-index:1;}
.stack-card.pos-out{transform:translateY(-60px) scale(1.05);opacity:0;z-index:4;}
.carrusel-seccion{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--sa);margin-bottom:8px;display:block;}
.carrusel-titulo{font-size:16px;font-weight:300;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.carrusel-fecha{font-size:11px;color:var(--cs);opacity:0.45;margin-top:10px;display:block;}
.stack-hint{text-align:center;margin-top:10px;font-size:11px;color:var(--cs);opacity:0.35;letter-spacing:0.1em;}
.stack-counter{position:absolute;top:12px;right:14px;font-size:10px;color:var(--sa);opacity:0.6;letter-spacing:0.1em;z-index:10;}
.stack-dots{display:flex;justify-content:center;gap:5px;margin-top:12px;}
.stack-dot{width:5px;height:5px;border-radius:50%;background:rgba(189,205,207,0.2);transition:all 0.3s;}
.stack-dot.activo{background:var(--sa);transform:scale(1.3);}

/* Menú */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.boton{background:rgba(255,255,255,0.04);border:1px solid rgba(189,205,207,0.15);border-radius:16px;padding:22px 16px;cursor:pointer;text-align:center;transition:all 0.25s;position:relative;overflow:hidden;color:var(--cr);}
.boton:active{transform:scale(0.97);}
.boton.activo{background:var(--vp);border-color:rgba(189,205,207,0.4);}
.boton.nuevo{border-color:rgba(227,184,184,0.55);animation:titilar 1.8s ease-in-out infinite;}
.boton.nuevo::after{content:'';position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--sa);box-shadow:0 0 6px var(--sa);animation:pulso 1.8s ease-in-out infinite;}
@keyframes titilar{0%,100%{box-shadow:0 0 0 rgba(227,184,184,0);}50%{box-shadow:0 0 16px rgba(227,184,184,0.35);}}
@keyframes pulso{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}
.boton-titulo{font-size:14px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;display:block;}
.boton-trayecto{display:flex;align-items:center;justify-content:space-between;text-align:left;}
.boton-horas{font-size:22px;font-weight:200;color:var(--sa);white-space:nowrap;}
.boton-horas small{font-size:11px;color:var(--cs);display:block;text-align:right;margin-top:-2px;font-weight:300;}
.boton-horas-parciales{font-size:10px;color:var(--cs);opacity:0.6;text-align:right;margin-top:4px;line-height:1.6;}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:18px 0 14px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(189,205,207,0.15);}
.divider span{font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--cs);opacity:0.5;white-space:nowrap;}

/* Panel */
#panel{margin-top:24px;}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.panel-titulo{font-size:20px;font-weight:300;letter-spacing:0.1em;}
.panel-cerrar{background:rgba(255,255,255,0.07);border:1px solid rgba(189,205,207,0.15);border-radius:50%;width:36px;height:36px;cursor:pointer;color:var(--cr);font-size:18px;display:flex;align-items:center;justify-content:center;}

/* Cards */
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(189,205,207,0.1);border-radius:16px;padding:20px;margin-bottom:12px;}
.card-fecha{font-size:11px;letter-spacing:0.1em;color:var(--cs);opacity:0.5;margin-bottom:6px;text-transform:uppercase;}
.card-titulo{font-weight:500;font-size:16px;margin-bottom:6px;line-height:1.4;}
.card-texto{font-size:15px;color:var(--cs);line-height:1.6;font-weight:300;}
.card-link{display:inline-block;margin-top:10px;font-size:14px;color:var(--sa);text-decoration:none;border-bottom:1px solid rgba(227,184,184,0.3);padding-bottom:2px;}
.card img{width:100%;border-radius:10px;margin-top:12px;}
.card-cumple{display:flex;align-items:center;gap:16px;}
.card-cumple-foto{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid rgba(189,205,207,0.2);flex-shrink:0;}
.card-cumple-avatar{width:56px;height:56px;border-radius:50%;background:var(--vp);border:2px solid rgba(189,205,207,0.2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.card-cumple-nombre{font-weight:500;font-size:16px;}
.card-cumple-fecha{font-size:13px;color:var(--cs);margin-top:3px;}

/* Comentarios */
.btn-comentarios{background:none;border:none;color:var(--cs);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;padding:8px 0 0;opacity:0.6;letter-spacing:0.05em;}
.comentarios-panel{margin-top:12px;border-top:1px solid rgba(189,205,207,0.1);padding-top:12px;display:none;}
.comentario-item{padding:10px 0;border-bottom:1px solid rgba(189,205,207,0.07);}
.comentario-nombre{font-size:11px;color:var(--sa);letter-spacing:0.05em;margin-bottom:4px;}
.comentario-texto{font-size:14px;color:var(--cs);font-weight:300;line-height:1.5;}
.comentario-fecha{font-size:10px;color:var(--cs);opacity:0.35;margin-top:3px;}
.comentario-form{margin-top:14px;padding-top:12px;border-top:1px solid rgba(189,205,207,0.1);}
.comentario-form input,.comentario-form textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(189,205,207,0.15);border-radius:10px;padding:10px 12px;color:var(--cr);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;margin-bottom:8px;}
.comentario-form textarea{resize:none;height:70px;line-height:1.5;}
.comentario-form input::placeholder,.comentario-form textarea::placeholder{color:rgba(189,205,207,0.25);}
.btn-enviar-com{background:var(--vp);border:none;border-radius:10px;padding:10px 20px;color:var(--cr);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;letter-spacing:0.08em;}

/* Estado */
.estado{text-align:center;padding:40px 20px;color:var(--cs);opacity:0.5;font-size:15px;}
.spinner{width:24px;height:24px;border:2px solid rgba(189,205,207,0.2);border-top-color:var(--cs);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Calendario */
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.cal-mes-label{font-size:13px;font-weight:300;letter-spacing:0.2em;text-transform:uppercase;}
.cal-nav-btn{background:none;border:1px solid rgba(189,205,207,0.15);border-radius:8px;color:var(--cs);font-size:16px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;margin-bottom:20px;}
.cal-dn{font-size:10px;color:var(--cs);opacity:0.4;padding-bottom:6px;}
.cal-d{font-size:14px;font-weight:300;padding:6px 2px;border-radius:8px;}
.cal-d.hoy{background:var(--vp);font-weight:500;}
.cal-d.tiene-evento{color:var(--sa);font-weight:500;position:relative;}
.cal-d.tiene-evento::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--sa);}
.cal-d.tiene-cumple{color:var(--cr);position:relative;}
.cal-d.tiene-cumple::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--cr);}
.cal-sep{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--cs);opacity:0.4;margin-bottom:12px;}
.cal-evento{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid rgba(189,205,207,0.07);}
.cal-ev-fecha{min-width:40px;text-align:center;flex-shrink:0;}
.cal-ev-num{font-size:26px;font-weight:200;line-height:1;color:var(--sa);}
.cal-ev-mes{font-size:10px;letter-spacing:0.1em;color:var(--cs);opacity:0.6;text-transform:uppercase;}
.cal-ev-titulo{font-size:15px;font-weight:400;margin-bottom:3px;}
.cal-ev-desc{font-size:13px;color:var(--cs);opacity:0.7;line-height:1.5;}
.cal-ev-link{font-size:12px;color:var(--sa);margin-top:5px;display:inline-block;text-decoration:none;border-bottom:1px solid rgba(227,184,184,0.3);}
.cal-ev-cumple{color:var(--cr);}

/* Footer */
footer{text-align:center;padding:30px 0 16px;border-top:1px solid rgba(189,205,207,0.07);margin-top:40px;}
footer p{font-size:11px;font-weight:300;letter-spacing:0.15em;color:var(--cs);opacity:0.35;line-height:2;}
</style>
</head>
<body>

<div class="app">

<script>
var SHEET_ID = '17sj1cY1PWxtax-ejWp5-tsRf7iSAUVqMAmFdaPbm6q8';
var API_KEY = 'AIzaSyAYKvaEhqJL8oa5szOJ0p-du7Mw8Chn3Tk';
var cache = {};
var seccionActiva = null;
var MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ── SPLASH ──
(function(){
  var splash = document.getElementById("splash");
  var logo = document.getElementById("splash-logo");
  var pts = document.getElementById("splash-pts");
  setTimeout(function(){ logo.style.opacity="1"; logo.style.transform="scale(1)"; }, 200);
  setTimeout(function(){
    for(var i=0;i<35;i++){
      var p = document.createElement("div");
      var sz = (Math.random()*3+1).toFixed(1);
      var tx = ((Math.random()-0.5)*300).toFixed(0)+"px";
      var ty = ((Math.random()-0.5)*300).toFixed(0)+"px";
      var dl = (Math.random()*0.5).toFixed(2)+"s";
      var col = Math.random()>0.5 ? "#034C36" : "#E3B8B8";
      p.style.cssText = "position:absolute;border-radius:50%;width:"+sz+"px;height:"+sz+"px;background:"+col+";left:"+Math.round(Math.random()*100)+"%;top:"+Math.round(Math.random()*100)+"%;--tx:"+tx+";--ty:"+ty+";animation:pt 0.7s "+dl+" forwards;";
      pts.appendChild(p);
    }
    logo.style.transition="all 0.7s";
    logo.style.opacity="0";
    logo.style.transform="scale(1.3)";
    setTimeout(function(){
      splash.style.transition="opacity 0.4s";
      splash.style.opacity="0";
      setTimeout(function(){ splash.style.display="none"; }, 450);
    }, 600);
  }, 5500);
})();

// ── MATE WHATSAPP ──
(function(){
  var depto = document.getElementById("h-depto");
  var nombre = depto ? depto.textContent.trim() : "el Departamento";
  var msg = encodeURIComponent("Tenemos novedades en " + nombre + "\nhttps://teal-lokum-07d15a.netlify.app");
  var link = document.getElementById("mate-wa");
  if(link) link.href = "https://wa.me/?text=" + msg;
})();

// ── LEER SHEETS ──
function formatFecha(v){
  if(!v) return '';
  var s = String(v);
  if(s.indexOf('/')>-1) return s;
  return s;
}

function leerHoja(hoja, callback){
  if(cache[hoja]){ callback(cache[hoja]); return; }
  var range = encodeURIComponent(hoja+'!A:F');
  var url = 'https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+range+'?key='+API_KEY;
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var rows = (data.values || []).slice(1);
      cache[hoja] = rows;
      callback(rows);
    })
    .catch(function(){ callback([]); });
}

// ── ABRIR ──
function abrir(nombre, btn){
  if(seccionActiva===nombre){cerrar();return;}
  seccionActiva=nombre;
  document.querySelectorAll('.boton').forEach(function(b){b.classList.remove('activo');});
  if(btn) btn.classList.add('activo');
  document.getElementById('panel').innerHTML = panelHeader(nombre)+'<div class="estado"><div class="spinner"></div>Cargando...</div>';
  document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'start'});
  leerHoja(nombre, function(rows){
    if(nombre==='CALENDARIO') renderCalendario(rows);
    else if(nombre==='CUMPLEAÑOS') renderCumpleanos(rows);
    else if(nombre.indexOf('TRAYECTO')>-1) renderTrayecto(nombre, rows);
    else renderPanel(nombre, rows);
  });
}

function panelHeader(nombre){
  return '<div class="panel-header"><span class="panel-titulo">'+nombre+'</span><button class="panel-cerrar" onclick="cerrar()">×</button></div>';
}
function cerrar(){
  seccionActiva=null;
  document.querySelectorAll('.boton').forEach(function(b){b.classList.remove('activo');});
  document.getElementById('panel').innerHTML='';
}

// ── RENDER PANEL ──
function renderPanel(nombre, rows){
  var html = panelHeader(nombre);
  if(!rows||rows.length===0){html+='<div class="estado">Sin contenido aún.</div>';}
  else{
    var cardIdx=0;
    rows.forEach(function(f,i){
      var titulo=f[2]||'',texto=f[3]||'',link=f[4]||'',fecha=formatFecha(f[1])||'';
      if(!titulo&&!texto&&!link) return;
      var cid=nombre.replace(/ /g,'_')+'_'+cardIdx;
      html+="<div class='card'>";
      if(fecha) html+="<div class='card-fecha'>"+fecha+"</div>";
      if(titulo) html+="<div class='card-titulo'>"+titulo+"</div>";
      if(texto) html+="<div class='card-texto'>"+texto+"</div>";
      if(link){
        var ls=link.toString();
        // Convertir cualquier link de Drive a imagen directa
        var driveId = ls.match(/(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})/);
        if(driveId){
          html+="<img src='https://drive.google.com/uc?export=view&id="+driveId[1]+"' loading='lazy' style='width:100%;border-radius:10px;margin-top:12px;' onerror="this.style.display='none'">";
        } else if(ls.indexOf('http')===0){
          html+="<a class='card-link' href='"+ls+"' target='_blank'>↗ Abrir enlace</a>";
        }
      }
      html+="<button class='btn-comentarios' onclick='toggleComentarios(\""+cid+"\",\""+nombre+"\","+i+")'>💬 comentarios</button>";
      html+="<div class='comentarios-panel' id='cpanel-"+cid+"'>";
      html+="<div id='coms-"+cid+"'></div>";
      html+="<div class='comentario-form'>";
      html+="<input type='text' placeholder='Tu nombre *' id='cnombre-"+cid+"'>";
      html+="<textarea placeholder='Comentario (opcional)...' id='ctexto-"+cid+"'></textarea>";
      html+="<button class='btn-enviar-com' onclick='enviarComentario(\""+cid+"\",\""+nombre+"\","+i+")'>Enviar</button>";
      html+="<div style='font-size:12px;margin-top:6px;color:var(--sa)' id='cmsg-"+cid+"'></div>";
      html+="</div></div></div>";
      cardIdx++;
    });
    if(cardIdx===0) html+='<div class="estado">Sin contenido aún.</div>';
  }
  document.getElementById('panel').innerHTML=html;
  document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── RENDER CUMPLEAÑOS ──
function renderCumpleanos(rows){
  var html=panelHeader('Cumpleaños');
  var datos=(rows||[]).filter(function(f){return f[2];});
  if(!datos.length){html+='<div class="estado">Sin cumpleaños cargados.</div>';}
  else{
    datos.forEach(function(f){
      var nombre=f[2]||'',fecha=formatFecha(f[1]||''),foto=f[4]||'';
      html+="<div class='card'><div class='card-cumple'>";
      if(foto&&foto.indexOf('drive.google.com')>-1){
        var fotoId = foto.match(/[-\w]{25,}/);
        var fotoSrc = fotoId ? 'https://drive.google.com/uc?export=view&id='+fotoId[0] : foto;
        html+="<img class='card-cumple-foto' src='"+fotoSrc+"' onerror=\"this.style.display='none'\">";
      }
      else html+="<div class='card-cumple-avatar'>🎂</div>";
      html+="<div><div class='card-cumple-nombre'>"+nombre+"</div><div class='card-cumple-fecha'>📅 "+fecha+"</div></div>";
      html+="</div></div>";
    });
  }
  document.getElementById('panel').innerHTML=html;
  document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── RENDER TRAYECTO ──
function renderTrayecto(nombre, rows){
  var titulo=nombre.indexOf('TURISMO')>-1?'Turismo':'Economía';
  var html=panelHeader(titulo);
  var datos=(rows||[]).filter(function(f){return f[0];});
  if(!datos.length){html+='<div class="estado">Sin datos aún.</div>';}
  else{
    html+='<div class="card" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:14px;">';
    html+='<tr style="border-bottom:1px solid rgba(189,205,207,0.15)">';
    ['Curso','Hs','Profesor','Fecha','Tema'].forEach(function(h){
      html+='<th style="text-align:left;padding:8px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--cs);font-weight:400;">'+h+'</th>';
    });
    html+='</tr>';
    datos.forEach(function(f){
      var hs=parseFloat(f[3])||0;
      html+='<tr style="border-bottom:1px solid rgba(189,205,207,0.07)">';
      html+='<td style="padding:10px 8px;font-weight:500;">'+f[0]+'</td>';
      html+='<td style="padding:10px 8px;color:var(--sa);">'+(hs||'—')+'</td>';
      html+='<td style="padding:10px 8px;color:var(--cs);">'+(f[2]||'—')+'</td>';
      html+='<td style="padding:10px 8px;color:var(--cs);white-space:nowrap;">'+(formatFecha(f[1])||'—')+'</td>';
      html+='<td style="padding:10px 8px;color:var(--cs);">'+(f[4]||'—')+'</td>';
      html+='</tr>';
    });
    html+='</table></div>';
  }
  document.getElementById('panel').innerHTML=html;
  document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── CALENDARIO ──
function renderCalendario(rows){
  var hoy=new Date(),mes=hoy.getMonth(),anio=hoy.getFullYear();
  var eventos=[];
  (rows||[]).forEach(function(f){
    if(!f[2]) return;
    var fs=formatFecha(f[1]||''),fechaObj=null;
    if(fs){var p=fs.split('/');if(p.length>=2) fechaObj=new Date(anio,parseInt(p[1])-1,parseInt(p[0]));}
    eventos.push({fecha:fechaObj,titulo:f[2]||'',desc:f[3]||'',link:f[4]||'',tipo:'evento'});
  });
  window._calEventos=eventos;
  leerHoja('CUMPLEAÑOS',function(crows){
    (crows||[]).forEach(function(f){
      var nombre=f[2]||'';if(!nombre)return;
      var fs=formatFecha(f[1]||''),fechaObj=null;
      if(fs){var p=fs.split('/');if(p.length>=2) fechaObj=new Date(anio,parseInt(p[1])-1,parseInt(p[0]));}
      if(fechaObj) window._calEventos.push({fecha:fechaObj,titulo:'🎂 '+nombre,desc:'',link:'',tipo:'cumple'});
    });
    _renderCal(mes,anio);
  });
}

function _renderCal(mes,anio){
  var hoy=new Date();
  var primerDia=new Date(anio,mes,1).getDay();
  var diasEnMes=new Date(anio,mes+1,0).getDate();
  var evDias={},cumDias={};
  (window._calEventos||[]).forEach(function(ev){
    if(ev.fecha&&ev.fecha.getMonth()===mes&&ev.fecha.getFullYear()===anio){
      if(ev.tipo==='cumple') cumDias[ev.fecha.getDate()]=true;
      else evDias[ev.fecha.getDate()]=true;
    }
  });
  var html=panelHeader('Calendario');
  html+='<div class="cal-nav"><button class="cal-nav-btn" onclick="_calNav(-1)">‹</button>';
  html+='<span class="cal-mes-label">'+MESES[mes]+' '+anio+'</span>';
  html+='<button class="cal-nav-btn" onclick="_calNav(1)">›</button></div>';
  html+='<div class="cal-grid">';
  ['D','L','M','M','J','V','S'].forEach(function(d){html+='<div class="cal-dn">'+d+'</div>';});
  for(var i=0;i<primerDia;i++) html+='<div></div>';
  for(var d=1;d<=diasEnMes;d++){
    var cls='cal-d';
    if(d===hoy.getDate()&&mes===hoy.getMonth()&&anio===hoy.getFullYear()) cls+=' hoy';
    if(evDias[d]) cls+=' tiene-evento';
    if(cumDias[d]) cls+=' tiene-cumple';
    html+='<div class="'+cls+'">'+d+'</div>';
  }
  html+='</div>';
  var evMes=(window._calEventos||[]).filter(function(ev){return ev.fecha&&ev.fecha.getMonth()===mes&&ev.fecha.getFullYear()===anio;});
  evMes.sort(function(a,b){return a.fecha-b.fecha;});
  if(evMes.length>0){
    html+='<div class="cal-sep">Eventos del mes</div>';
    evMes.forEach(function(ev){
      var dia=ev.fecha.getDate();
      var mesC=MESES[ev.fecha.getMonth()].substring(0,3).toLowerCase();
      html+='<div class="cal-evento"><div class="cal-ev-fecha"><div class="cal-ev-num">'+dia+'</div><div class="cal-ev-mes">'+mesC+'</div></div>';
      html+='<div><div class="'+(ev.tipo==='cumple'?'cal-ev-titulo cal-ev-cumple':'cal-ev-titulo')+'">'+ev.titulo+'</div>';
      if(ev.desc) html+='<div class="cal-ev-desc">'+ev.desc+'</div>';
      if(ev.link) html+='<a class="cal-ev-link" href="'+ev.link+'" target="_blank">↗ Ver</a>';
      html+='</div></div>';
    });
  } else {
    html+='<div class="estado" style="padding:20px 0">Sin eventos este mes</div>';
  }
  document.getElementById('panel').innerHTML=html;
  document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'start'});
  window._calMes=mes; window._calAnio=anio;
}
window._calNav=function(d){var m=(window._calMes||0)+d,a=window._calAnio||new Date().getFullYear();if(m>11){m=0;a++;}if(m<0){m=11;a--;}_renderCal(m,a);};

// ── COMENTARIOS ──
function toggleComentarios(cid,seccion,idx){
  var panel=document.getElementById('cpanel-'+cid);
  if(!panel) return;
  if(panel.style.display==='block'){panel.style.display='none';return;}
  panel.style.display='block';
  var lista=document.getElementById('coms-'+cid);
  lista.innerHTML='<div style="font-size:12px;color:var(--cs);opacity:0.4;padding:8px 0">Cargando...</div>';
  google.script.run
    .withSuccessHandler(function(coms){
      if(!coms||!coms.length){lista.innerHTML='<div style="font-size:13px;color:var(--cs);opacity:0.4;padding:8px 0">Sin comentarios aún.</div>';return;}
      var h='';
      coms.forEach(function(c){h+="<div class='comentario-item'><div class='comentario-nombre'>"+(c[0]||'')+"</div><div class='comentario-texto'>"+(c[1]||'')+"</div><div class='comentario-fecha'>"+(c[2]||'')+"</div></div>";});
      lista.innerHTML=h;
    })
    .withFailureHandler(function(){lista.innerHTML='<div style="font-size:13px;opacity:0.4;">No disponible.</div>';})
    .obtenerComentarios(seccion,idx);
}

function enviarComentario(cid,seccion,idx){
  var nombre=(document.getElementById('cnombre-'+cid)||{value:''}).value.trim();
  var texto=(document.getElementById('ctexto-'+cid)||{value:''}).value.trim();
  var msg=document.getElementById('cmsg-'+cid);
  if(!nombre){if(msg)msg.textContent='⚠️ Tu nombre es obligatorio.';return;}
  if(msg)msg.textContent='Enviando...';
  google.script.run
    .withSuccessHandler(function(ok){
      if(ok){if(msg)msg.textContent='✅ Enviado.';var inp=document.getElementById('ctexto-'+cid);if(inp)inp.value='';}
      else{if(msg)msg.textContent='❌ Error.';}
    })
    .withFailureHandler(function(){if(msg)msg.textContent='❌ No se pudo conectar.';})
    .guardarComentario(seccion,idx,nombre,texto||'👍');
}

// ── CARRUSEL ──
function cargarCarrusel(){
  var secs=['NOVEDADES','MATERIALES','CALENDARIO','INDUCCION'];
  var pend=secs.length,todas=[];
  secs.forEach(function(sec){
    leerHoja(sec,function(rows){
      if(rows&&rows.length>0){
        for(var i=rows.length-1;i>=0;i--){
          var t=rows[i][2]||rows[i][3]||'';
          if(t){todas.push({seccion:sec,titulo:t.toString(),fecha:formatFecha(rows[i][1])||''});break;}
        }
      }
      if(--pend===0) renderCarrusel(todas);
    });
  });
}

function renderCarrusel(items){
  if(!items||!items.length) return;
  var top = items.slice(0,3);
  var cur = 0;
  
  function buildHtml(){
    var html = '<div class="carrusel-wrap-outer"><div class="carrusel-label">últimas novedades</div>';
    html += '<div class="stack-container" id="stack-cont" onclick="stackNext()">';
    html += '<div class="stack-counter" id="stack-counter">1 / '+top.length+'</div>';
    top.forEach(function(item, i){
      var pos = i; // 0=frente, 1=medio, 2=atrás
      html += '<div class="stack-card pos-'+pos+'" id="scard-'+i+'">';
      html += '<span class="carrusel-seccion">'+item.seccion.charAt(0)+item.seccion.slice(1).toLowerCase()+'</span>';
      html += '<div class="carrusel-titulo">'+item.titulo+'</div>';
      if(item.fecha) html += '<span class="carrusel-fecha">'+item.fecha+'</span>';
      html += '</div>';
    });
    html += '</div>';
    html += '<div class="stack-hint">toca para ver más</div>';
    html += '<div class="stack-dots">';
    top.forEach(function(_,i){html += '<div class="stack-dot'+(i===0?' activo':'')+'" id="sdot-'+i+'"></div>';});
    html += '</div></div>';
    return html;
  }
  
  document.getElementById('carrusel-wrap').innerHTML = buildHtml();
  
  window.stackNext = function(){
    var n = top.length;
    var cards = document.querySelectorAll('.stack-card');
    var dots = document.querySelectorAll('.stack-dot');
    // Animar card del frente: sale volando arriba
    var front = document.getElementById('scard-'+cur);
    if(front){
      front.classList.remove('pos-0');
      front.classList.add('pos-out');
    }
    setTimeout(function(){
      // Rotar posiciones
      cur = (cur+1) % n;
      cards.forEach(function(card, i){
        card.className = 'stack-card';
        var idx = parseInt(card.id.split('-')[1]);
        var rel = ((idx - cur) + n) % n;
        if(rel < 3) card.classList.add('pos-'+rel);
        else card.style.opacity = '0';
      });
      dots.forEach(function(d,i){
        d.classList.toggle('activo', i===cur);
      });
      var counter = document.getElementById('stack-counter');
      if(counter) counter.textContent = (cur+1) + ' / ' + n;
    }, 200);
  };
}

// ── HORAS TRAYECTO ──
function cargarHorasTrayecto(nombre,idTotal,idParciales){
  leerHoja(nombre,function(rows){
    if(!rows||!rows.length) return;
    var total=0,lineas=[];
    rows.forEach(function(f){
      var hs=parseFloat(f[3])||0;
      if(!f[0]) return;
      total+=hs;
      if(hs>0) lineas.push(f[0]+': '+hs+' hs');
    });
    document.getElementById(idTotal).innerHTML=total+'<small>hs totales</small>';
    document.getElementById(idParciales).innerHTML=lineas.join('<br>');
  });
}

// ── BOTONES TITILANTES ──
function marcarTitilantes(){
  var secs=['NOVEDADES','MATERIALES','CALENDARIO','INDUCCION','ATAJOS','INTEGRANTES'];
  var fechas=[],pend=secs.length;
  secs.forEach(function(sec){
    leerHoja(sec,function(rows){
      var maxF=null;
      (rows||[]).forEach(function(f){
        if(f[5]){var d=new Date(f[5]);if(!isNaN(d)&&(!maxF||d>maxF)) maxF=d;}
      });
      if(maxF) fechas.push({seccion:sec,fecha:maxF});
      if(--pend===0){
        fechas.sort(function(a,b){return b.fecha-a.fecha;});
        var top2=fechas.slice(0,2).map(function(x){return x.seccion;});
        document.querySelectorAll('.boton').forEach(function(b){
          var oc=b.getAttribute('onclick')||'';
          top2.forEach(function(sec){if(oc.indexOf("'"+sec+"'")>-1) b.classList.add('nuevo');});
        });
      }
    });
  });
}
